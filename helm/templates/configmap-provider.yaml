apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jfrog-credential-provider.fullname" . }}-config
  namespace: {{ include "jfrog-credential-provider.namespace" . }}
data:
  {{- $cloudProvider := include "jfrog-credential-provider.cloudProvider" . }}
  {{- $kubeletYaml := eq (include "jfrog-credential-provider.kubeletConfigYaml" .) "true" }}
  {{- if $kubeletYaml }}
  jfrog-provider.yaml: |
  {{- else if (eq $cloudProvider "aws") }}
  jfrog-provider.json: |
    {
  {{- end }}

    {{- range .Values.providerConfig }}
    {{- if $kubeletYaml }}
    name: {{ .name }}
    apiVersion: credentialprovider.kubelet.k8s.io/v1
    matchImages: {{ .matchImages | toJson }}
    defaultCacheDuration: {{ .defaultCacheDuration | quote }}
    {{- if and (eq $cloudProvider "aws") .tokenAttributes .tokenAttributes.enabled }}
    {{- include "jfrog-credential-provider.awsTokenAttributesYaml" . | nindent 4 }}
    {{- else if and .tokenAttributes .tokenAttributes.enabled (eq $cloudProvider "azure") }}
    tokenAttributes:
      {{- if .azure.azure_app_audience }}
      serviceAccountTokenAudience: {{ .azure.azure_app_audience | quote }}
      {{- else}}
      serviceAccountTokenAudience: api://AzureADTokenExchange
      {{- end }}
      cacheType: ServiceAccount
      requireServiceAccount: {{ .tokenAttributes.requireServiceAccount | default true }}
      requiredServiceAccountAnnotationKeys:
        - azure.workload.identity/client-id
        - JFrogExchange
    {{- else if and .tokenAttributes .tokenAttributes.enabled (eq $cloudProvider "gcp") }}
    tokenAttributes:
      {{- if .gcp.jfrog_oidc_audience }}
      serviceAccountTokenAudience: {{ .gcp.jfrog_oidc_audience }}
      {{- else}}
      serviceAccountTokenAudience: "artifactory"
      {{- end }}
      cacheType: ServiceAccount
      requireServiceAccount: {{ .tokenAttributes.requireServiceAccount | default true }}
      requiredServiceAccountAnnotationKeys:
        - iam.gke.io/gcp-service-account
        - JFrogExchange
    {{- end }}
    {{- if eq $cloudProvider "aws" }}
    {{- include "jfrog-credential-provider.awsEnvYaml" (dict "item" . "Values" $.Values "Root" $) | nindent 4 }}
    {{- else if eq $cloudProvider "gcp" }}
    env:
    - name: cloud_provider
      value: "google"
    - name: artifactory_url
      value: "{{ .artifactoryUrl }}"
    - name: google_service_account_email
      value: "{{ .gcp.google_service_account_email }}"
    - name: jfrog_oidc_audience
      value: "{{ .gcp.jfrog_oidc_audience }}"
    - name: jfrog_oidc_provider_name
      value: "{{ .gcp.jfrog_oidc_provider_name }}"
    - name: disable_provider_autoupdate
      value: "{{ not $.Values.autoUpgrade }}"
    - name: log_level
      value: "{{ $.Values.logLevel }}"
    {{- if .http_timeout_seconds }}
    - name: http_timeout_seconds
      value: "{{ .http_timeout_seconds }}"
    {{- end }}
    {{- else if eq $cloudProvider "azure" }}
    {{- include "jfrog-credential-provider.azureEnvYaml" (dict "item" . "Values" $.Values) | nindent 4 }}
    {{- end }}
    {{- else if eq $cloudProvider "aws" }}
    "name": "{{ .name  }}",
    "matchImages": {{ .matchImages | toJson }},
    "defaultCacheDuration": {{ .defaultCacheDuration | toJson }},
    "apiVersion": "credentialprovider.kubelet.k8s.io/v1",

    {{- if and .tokenAttributes .tokenAttributes.enabled }}
    "tokenAttributes": {
      "serviceAccountTokenAudience": "sts.amazonaws.com",
      "cacheType": "ServiceAccount",
      "requireServiceAccount": {{ .tokenAttributes.requireServiceAccount | default false }},
      {{- if .tokenAttributes.requireServiceAccount }}
      "requiredServiceAccountAnnotationKeys": [
        "eks.amazonaws.com/role-arn",
        "JFrogExchange"
      ]
      {{- else }}
      "optionalServiceAccountAnnotationKeys": [
        "eks.amazonaws.com/role-arn",
        "JFrogExchange"
      ]
      {{- end }}
    },
    {{- end }}

    "env": [
    {
      "name": "cloud_provider",
      "value": "aws"
    },
    {
      "name": "aws_auth_method",
      "value": {{ .aws.aws_auth_method | toJson }}
    },
    {
      "name": "artifactory_url",
      "value": {{ .artifactoryUrl | toJson }}
    },
    {
      "name": "disable_provider_autoupdate",
      "value": "{{ not $.Values.autoUpgrade }}"
    },
    {
      "name": "log_level",
      "value": {{ $.Values.logLevel | toJson }}
    },
    {{- if .http_timeout_seconds }}
    {
      "name": "http_timeout_seconds",
      "value": "{{ .http_timeout_seconds | toJson }}"
    },
    {{- end }}
    {{- if .aws.aws_region }}
    {
      "name": "aws_region",
      "value": {{ .aws.aws_region | toJson }}
    },
    {{- end }}
    {{- if eq .aws.aws_auth_method "cognito_oidc" }}
    {
      "name": "secret_name",
      "value": {{ .aws.aws_cognito_user_pool_secret_name | toJson }}
    },
    {
      "name": "user_pool_name",
      "value": {{ .aws.aws_cognito_user_pool_name | toJson }}
    },
    {
      "name": "resource_server_name",
      "value": {{ .aws.aws_cognito_resource_server_name | toJson }}
    },
    {
      "name": "user_pool_resource_scope",
      "value": {{ .aws.aws_cognito_user_pool_resource_scope | toJson }}
    },
    {
      "name": "jfrog_oidc_provider_name",
      "value": {{ .aws.jfrog_oidc_provider_name | toJson }}
    }
    ]
    }
    {{- else if eq .aws.aws_auth_method "assume_role" }}
    {{- if ne (include "jfrog-credential-provider.awsOmitRoleNameFallback" (dict "item" . "root" $)) "true" }}
    {
      "name": "aws_role_name",
      "value": {{ .aws.aws_role_name | toJson }}
    },
    {{- end }}
    {
      "name": "secret_ttl_seconds",
      "value": {{- if .aws.secret_ttl_seconds }}{{ .aws.secret_ttl_seconds | toString | quote }}{{ else }}"14400"{{ end }}
    }
    ]
    }
    {{- else if eq .aws.aws_auth_method "assume_external_role" }}
    {
      "name": "aws_external_role_arn",
      "value": {{ .aws.aws_external_role_arn | toJson }}
    },
    {{- if .aws.aws_external_role_session_duration_seconds }}
    {
      "name": "aws_external_role_session_duration_seconds",
      "value": {{ .aws.aws_external_role_session_duration_seconds | toString | quote }}
    },
    {{- end }}
    {
      "name": "secret_ttl_seconds",
      "value": {{- if .aws.secret_ttl_seconds }}{{ .aws.secret_ttl_seconds | toString | quote }}{{ else }}"14400"{{ end }}
    }
    ]
    }
    {{- end }}
    {{- end }}
    {{- end }}
