apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jfrog-credential-provider.fullname" . }}-config
  namespace: {{ include "jfrog-credential-provider.namespace" . }}
data:
  {{- $cloudProvider := include "jfrog-credential-provider.cloudProvider" . }}
  {{- if or (eq $cloudProvider "azure") (eq $cloudProvider "gcp") }}
  jfrog-provider.yaml: |
    {{- range .Values.providerConfig }}
    - name: {{ .name }}
      apiVersion: credentialprovider.kubelet.k8s.io/v1
      matchImages: {{ .matchImages | toJson }}
      defaultCacheDuration: {{ .defaultCacheDuration }}
      {{- if and .tokenAttributes .tokenAttributes.enabled (eq $cloudProvider "azure") }}
      tokenAttributes:
      {{- if .azure.azure_app_audience }}
        serviceAccountTokenAudience: {{ .azure.azure_app_audience }}
      {{- else }}
        serviceAccountTokenAudience: api://AzureADTokenExchange
      {{- end }}
        cacheType: ServiceAccount
        requireServiceAccount: true
        requiredServiceAccountAnnotationKeys:
          - azure.workload.identity/client-id
          - JFrogExchange
      {{- end }}
      {{- if and .tokenAttributes .tokenAttributes.enabled (eq $cloudProvider "gcp") }}
      tokenAttributes:
      {{- if .gcp.jfrog_oidc_audience }}
        serviceAccountTokenAudience: {{ .gcp.jfrog_oidc_audience }}
      {{- else }}
        serviceAccountTokenAudience: "artifactory"
      {{- end }}
        cacheType: ServiceAccount
        requireServiceAccount: true
        requiredServiceAccountAnnotationKeys:
          - iam.gke.io/gcp-service-account
          - JFrogExchange
      {{- end }}
      {{- if eq $cloudProvider "gcp" }}
      env:
      - name: artifactory_url
        value: "{{ .artifactoryUrl }}"
      - name: google_service_account_email
        value: "{{ .gcp.google_service_account_email }}"
      - name: jfrog_oidc_audience
        value: "{{ .gcp.jfrog_oidc_audience }}"
      - name: jfrog_oidc_provider_name
        value: "{{ .gcp.jfrog_oidc_provider_name }}"
      - name: disable_provider_autoupdate
        value: "{{ not $.Values.autoUpgrade }}"
      - name: log_level
        value: "{{ $.Values.logLevel }}"
      {{- if .http_timeout_seconds }}
      - name: http_timeout_seconds
        value: "{{ .http_timeout_seconds }}"
      {{- end }}
      {{- end }}
      {{- if eq $cloudProvider "azure" }}
      env:
      - name: artifactory_url
        value: "{{ .artifactoryUrl }}"
      - name: azure_app_client_id
        value: "{{ .azure.azure_app_client_id }}"
      {{- if .azure.azure_cloud_name }}
      - name: azure_cloud_name
        value: "{{ .azure.azure_cloud_name }}"
      {{- end }}
      - name: azure_tenant_id
        value: "{{ .azure.azure_tenant_id }}"
      - name: azure_nodepool_client_id
        value: "{{ .azure.azure_nodepool_client_id }}"
      - name: azure_app_audience
        value: "{{ .azure.azure_app_audience }}"
      - name: jfrog_oidc_provider_name
        value: "{{ .azure.jfrog_oidc_provider_name }}"
      - name: disable_provider_autoupdate
        value: "{{ not $.Values.autoUpgrade }}"
      - name: log_level
        value: "{{ $.Values.logLevel }}"
      {{- if .http_timeout_seconds }}
      - name: http_timeout_seconds
        value: "{{ .http_timeout_seconds }}"
      {{- end }}
      {{- end }}
    {{- end }}
  {{- else if (eq $cloudProvider "aws") }}
  jfrog-provider.json: |
    [
    {{- range $i, $p := .Values.providerConfig }}
    {{- if $i }},{{- end }}
    {
      "name": "{{ $p.name }}",
      "matchImages": {{ $p.matchImages | toJson }},
      "defaultCacheDuration": {{ $p.defaultCacheDuration | toJson }},
      "apiVersion": "credentialprovider.kubelet.k8s.io/v1",
      {{- if and $p.tokenAttributes $p.tokenAttributes.enabled }}
      "tokenAttributes": {
        "serviceAccountTokenAudience": "sts.amazonaws.com",
        "cacheType": "ServiceAccount",
        "requireServiceAccount": false,
        "optionalServiceAccountAnnotationKeys": [
          "eks.amazonaws.com/role-arn",
          "JFrogExchange"
        ]
      },
      {{- end }}
      "env": [
        {
          "name": "aws_auth_method",
          "value": {{ $p.aws.aws_auth_method | toJson }}
        },
        {
          "name": "artifactory_url",
          "value": {{ $p.artifactoryUrl | toJson }}
        },
        {
          "name": "disable_provider_autoupdate",
          "value": "{{ not $.Values.autoUpgrade }}"
        },
        {
          "name": "log_level",
          "value": {{ $.Values.logLevel | toJson }}
        },
        {{- if $p.http_timeout_seconds }}
        {
          "name": "http_timeout_seconds",
          "value": "{{ $p.http_timeout_seconds | toJson }}"
        },
        {{- end }}
        {{- if $p.aws.aws_region }}
        {
          "name": "aws_region",
          "value": {{ $p.aws.aws_region | toJson }}
        },
        {{- end }}
        {{- if eq $p.aws.aws_auth_method "cognito_oidc" }}
        {
          "name": "secret_name",
          "value": {{ $p.aws.aws_cognito_user_pool_secret_name | toJson }}
        },
        {
          "name": "user_pool_name",
          "value": {{ $p.aws.aws_cognito_user_pool_name | toJson }}
        },
        {
          "name": "resource_server_name",
          "value": {{ $p.aws.aws_cognito_resource_server_name | toJson }}
        },
        {
          "name": "user_pool_resource_scope",
          "value": {{ $p.aws.aws_cognito_user_pool_resource_scope | toJson }}
        },
        {
          "name": "jfrog_oidc_provider_name",
          "value": {{ $p.aws.jfrog_oidc_provider_name | toJson }}
        }
        {{- else if eq $p.aws.aws_auth_method "assume_role" }}
        {
          "name": "aws_role_name",
          "value": {{ $p.aws.aws_role_name | toJson }}
        },
        {
          "name": "secret_ttl_seconds",
          "value": {{- if $p.aws.secret_ttl_seconds }}{{ $p.aws.secret_ttl_seconds | toString | quote }}{{ else }}"14400"{{ end }}
        }
        {{- end }}
      ]
    }
    {{- end }}
    ]
  {{- end }}
