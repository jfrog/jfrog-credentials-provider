 {{/* Checks if there is at least one cloud provider enabled in at least one providerConfig */}}
 {{/* If not, it will fail the installation */}}
{{- $hasEnabledProvider := false }}
{{- range .Values.providerConfig }}
  {{- if or (and .aws .aws.enabled) (and .azure .azure.enabled) (and .gcp .gcp.enabled) }}
    {{- $hasEnabledProvider = true }}
  {{- end }}
{{- end }}
{{- if not $hasEnabledProvider }}
{{- $errorMsg := "\nERROR: At least one cloud provider must be enabled in providerConfig.\n" }}
{{- $errorMsg = printf "%s\nPlease enable one of the following:\n" $errorMsg }}
{{- $errorMsg = printf "%s  - providerConfig[].aws.enabled = true\n" $errorMsg }}
{{- $errorMsg = printf "%s  - providerConfig[].azure.enabled = true\n" $errorMsg }}
{{- $errorMsg = printf "%s  - providerConfig[].gcp.enabled = true\n" $errorMsg }}
{{- $errorMsg = printf "%s\nExample:\n" $errorMsg }}
{{- $errorMsg = printf "%s  providerConfig:\n" $errorMsg }}
{{- $errorMsg = printf "%s    - name: jfrog-credentials-provider\n" $errorMsg }}
{{- $errorMsg = printf "%s      aws:\n" $errorMsg }}
{{- $errorMsg = printf "%s        enabled: true\n" $errorMsg }}
{{- fail $errorMsg }}
{{- end }}

{{/* Only one cloud provider can be enabled at a time for each providerConfig */}}
{{- range .Values.providerConfig }}
  {{- $enabledCount := 0 }}
  {{- if and .aws .aws.enabled }}{{ $enabledCount = add $enabledCount 1 }}{{- end }}
  {{- if and .azure .azure.enabled }}{{ $enabledCount = add $enabledCount 1 }}{{- end }}
  {{- if and .gcp .gcp.enabled }}{{ $enabledCount = add $enabledCount 1 }}{{- end }}
  {{- if gt $enabledCount 1 }}
    {{- $errorMsg := "\nERROR: Only one cloud provider can be enabled at the same time for each providerConfig.\n" }}
    {{- $errorMsg = printf "%sCurrent providerConfig '%s' has %d cloud providers enabled.\n" $errorMsg .name $enabledCount }}
    {{- $errorMsg = printf "%sPlease enable only one of: aws, azure, or gcp.\n" $errorMsg }}
    {{- fail $errorMsg }}
  {{- end }}
{{- end }}

{{/* If more than one providerConfig is enabled, check that the cloud providers are same for each providerConfig */}}
{{- $firstProviderType := "" }}
{{- $firstProviderName := "" }}
{{- range .Values.providerConfig }}
  {{- $currentProviderType := "" }}
  {{- if and .aws .aws.enabled }}{{ $currentProviderType = "aws" }}{{- end }}
  {{- if and .azure .azure.enabled }}{{ $currentProviderType = "azure" }}{{- end }}
  {{- if and .gcp .gcp.enabled }}{{ $currentProviderType = "gcp" }}{{- end }}
  {{- if $currentProviderType }}
    {{- if and $firstProviderType (ne $firstProviderType $currentProviderType) }}
      {{- $errorMsg := "\nERROR: All providerConfig entries must use the same cloud provider.\n" }}
      {{- $errorMsg = printf "%sFound conflicting providers:\n" $errorMsg }}
      {{- $errorMsg = printf "%s  - '%s' uses '%s'\n" $errorMsg $firstProviderName $firstProviderType }}
      {{- $errorMsg = printf "%s  - '%s' uses '%s'\n" $errorMsg .name $currentProviderType }}
      {{- $errorMsg = printf "%s\nAll providerConfig entries must use the same cloud provider type.\n" $errorMsg }}
      {{- fail $errorMsg }}
    {{- end }}
    {{- if not $firstProviderType }}
      {{- $firstProviderType = $currentProviderType }}
      {{- $firstProviderName = .name }}
    {{- end }}
  {{- end }}
{{- end }}

{{/* platform is optional; when set, only openshift is valid */}}
{{- if and .Values.platform (ne .Values.platform "openshift") }}
{{- fail (printf "\nERROR: Invalid platform %q. Omit platform for EKS, AKS, and GKE, or set platform: openshift for OpenShift (see OpenShift.md)." .Values.platform) }}
{{- end }}
{{- if eq (include "jfrog-credential-provider.isOpenShift" .) "true" }}
{{- if ne (include "jfrog-credential-provider.isOpenShiftStaging" .) "true" }}
{{- fail "\nERROR: platform: openshift requires providerConfig[].aws.enabled or providerConfig[].azure.enabled. OpenShift on Google Cloud is not supported in this chart version. See OpenShift.md." }}
{{- end }}
{{- range .Values.providerConfig }}
{{- if and .aws .aws.enabled }}
{{- if not (and .tokenAttributes .tokenAttributes.enabled .tokenAttributes.requireServiceAccount) }}
{{- fail (printf "\nERROR: platform: openshift with AWS requires providerConfig[%q].tokenAttributes.enabled: true and requireServiceAccount: true (IRSA only; aws_role_name fallback is not supported). See OpenShift.md." .name) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{/* Validate logLevel is a supported value */}}
{{- $logLevel := upper .Values.logLevel }}
{{- if and (ne $logLevel "INFO") (ne $logLevel "DEBUG") }}
{{- fail (printf "\nERROR: Invalid logLevel %q. Supported values are \"INFO\" or \"DEBUG\"." .Values.logLevel) }}
{{- end }}

{{/* autoUpgrade is incompatible with a pre-baked binary or authenticated download */}}
{{- if .Values.autoUpgrade }}
  {{- $authUsed := or .Values.binaryDownload.auth.existingSecret .Values.binaryDownload.auth.username .Values.binaryDownload.auth.accessToken }}
  {{- if or .Values.internalBinaryHostPath $authUsed }}
    {{- $errorMsg := "\nERROR: autoUpgrade cannot be enabled when internalBinaryHostPath or binaryDownload.auth is used.\n" }}
    {{- if .Values.internalBinaryHostPath }}
      {{- $errorMsg = printf "%s  - internalBinaryHostPath is set (binary is provided on the node; there is nothing to auto-upgrade).\n" $errorMsg }}
    {{- end }}
    {{- if $authUsed }}
      {{- $errorMsg = printf "%s  - binaryDownload.auth is configured.\n" $errorMsg }}
    {{- end }}
    {{- $errorMsg = printf "%s\nSet autoUpgrade=false (the default) to proceed.\n" $errorMsg }}
    {{- fail $errorMsg }}
  {{- end }}
{{- end }}

{{/* When aws_auth_method == "assume_external_role", aws_external_role_arn must be set */}}
{{- range .Values.providerConfig }}
  {{- if and .aws .aws.enabled (eq (.aws.aws_auth_method | default "") "assume_external_role") }}
    {{- if not .aws.aws_external_role_arn }}
      {{- $errorMsg := printf "\nERROR: providerConfig '%s' has aws.aws_auth_method=\"assume_external_role\" but aws.aws_external_role_arn is empty.\n" .name }}
      {{- $errorMsg = printf "%sSet aws.aws_external_role_arn to the ARN of the role to assume across accounts.\n" $errorMsg }}
      {{- fail $errorMsg }}
    {{- end }}
  {{- end }}
{{- end }}

