providerConfig:
  - name: jfrog-credentials-provider
    artifactoryUrl: "<artifactory-url>"
    matchImages:
      - "*.<test.your-org.domain.io>"
    defaultCacheDuration: 5h
    tokenAttributes:
      enabled: true
    gcp:
      enabled: true
      google_service_account_email: "<google-service-account-email>"
      jfrog_oidc_audience: "<PROJECT_ID>.svc.id.goog"
      jfrog_oidc_provider_name: "<jfrog-oidc-provider-name>"

# Required for Kubernetes 1.33+ (ServiceAccountNodeAudienceRestriction feature gate).
# Grants system:nodes permission to request service account tokens for the
# jfrog_oidc_audience above. See GCP.md Step 3B.5 for details.
rbac:
  create: true

serviceAccount:
  create: true
  annotations:
    "iam.gke.io/gcp-service-account": "<google-service-account-email>"
    "JFrogExchange": "true"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: credentialsProviderEnabled
              operator: In
              values:
                - "true"
