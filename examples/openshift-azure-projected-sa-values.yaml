# OpenShift on Azure with projected service account tokens (Microsoft Entra Workload Identity). Requires OpenShift 4.21+.
#
# See OpenShift.md for managed identity, federated credential, Artifactory OIDC, and SCC setup.

platform: openshift

openshift:
  grantPrivilegedSCC: true
  labelNamespacePodSecurity: true

providerConfig:
  - name: jfrog-credentials-provider
    artifactoryUrl: "<your-instance>.jfrog.io"
    matchImages:
      - "*.jfrog.io"
      # Alternatively, specify your Artifactory hostname explicitly:
      # - "<your-instance>.jfrog.io"
    defaultCacheDuration: 5h
    tokenAttributes:
      enabled: true
      requireServiceAccount: true
    azure:
      enabled: true
      # Artifactory OIDC exchange audience (not an Entra application ID on OpenShift)
      azure_app_client_id: "*@*"
      azure_app_audience: "api://AzureADTokenExchange"
      jfrog_oidc_provider_name: "<jfrog-oidc-provider-name>"

rbac:
  create: true

nodeSelector:
  node-role.kubernetes.io/worker: ""

tolerations:
  - operator: Exists

serviceAccount:
  create: true
  # Do not annotate the DaemonSet service account with azure.workload.identity/client-id.
  # Workload identity belongs on application service accounts that pull images.

containerLogging:
  enabled: true
